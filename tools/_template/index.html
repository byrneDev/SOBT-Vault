<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SOBT Developer Tool</title>
    <link rel="stylesheet" href="../_shared/ui.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="tool-actions">
    <button id="aboutBtn" class="secondary-btn">About</button>
</div>

    <section class="panel">

        <form id="toolForm">

            <div class="form-group">
                <label class="label">Tool Action</label>
                <button type="button" id="runToolBtn" class="primary-btn full-width">Run Tool</button>
            </div>

        </form>

    </section>

    <section class="panel status-panel">

        <h3>Tool Status</h3>

        <div id="progressContainer" class="progress-container hidden">
            <div id="progressBar" class="progress-bar"></div>
        </div>

        <div id="statusMessage" class="status-message">
            Awaiting tool action...
        </div>

        <div class="log-container">
            <h4>Tool Log</h4>
            <pre id="logOutput"></pre>
        </div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
