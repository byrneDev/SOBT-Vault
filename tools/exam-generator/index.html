<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SOBT Exam Generator</title>
    <link rel="stylesheet" href="../_shared/ui.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">

<div class="tool-actions" style="display:flex; justify-content:flex-end; gap:10px; margin:16px 0;">

    <button id="aboutBtn" class="secondary-btn">About</button>
</div>

<section class="panel action-panel">

<h3>Exam Generator Actions</h3>

<div class="header-actions">

    <div class="file-row">
        <button id="importBankBtn" class="secondary-btn">Import Bank</button>
        <span id="importBankName" class="file-name file-status empty">No bank selected</span>
        <input type="file" id="importBankFile" accept=".js,.json" style="display:none">
    </div>

    <div class="file-row">
        <button id="importExcelBtn" class="secondary-btn">Import Excel</button>
        <span id="importExcelName" class="file-name file-status empty">No file selected</span>
        <input type="file" id="importExcelFile" accept=".xlsx,.xls" style="display:none">
    </div>

    <button id="generateBankBtn" class="primary-btn full-width">Generate Exam Bank</button>

</div>

</section>




<!-- MANUAL QUESTION ENTRY -->

<section class="panel">

<h3>Manual Question Entry</h3>

<div class="form-grid">

  <div class="form-group">
    <label class="label">TOS (Terminal Objective)</label>
    <input type="text" id="tos" class="input" placeholder="Terminal Objective Group">
  </div>

  <div class="form-group">
    <label class="label">EOS (Enabling Objective)</label>
    <input type="text" id="eos" class="input" placeholder="TO1: Enabling Objective Group">
  </div>

  <div class="form-group">
    <label class="label">Question ID</label>
    <input type="text" id="questionID" class="input">
  </div>

  <div class="form-group">
    <label class="label">Question Type</label>
    <select id="questionType" class="input">
      <option value="MC">Multiple Choice</option>
      <option value="MA">Multiple Answer</option>
    </select>
  </div>

</div>

<div class="form-group">
<label class="label">Question</label>
<textarea id="questionText" class="input"></textarea>
</div>

<div class="choices-grid">

  <div class="form-group">
    <label class="label">Choice A</label>
    <input type="text" id="choiceA" class="input">
  </div>

  <div class="form-group">
    <label class="label">Choice B</label>
    <input type="text" id="choiceB" class="input">
  </div>

  <div class="form-group">
    <label class="label">Choice C</label>
    <input type="text" id="choiceC" class="input">
  </div>

  <div class="form-group">
    <label class="label">Choice D</label>
    <input type="text" id="choiceD" class="input">
  </div>

</div>

<div class="form-group">
<label class="label">Correct Answer</label>
<input type="text" id="correctAnswer" placeholder="A or A,B" class="input">
</div>

<div class="form-group">
<label class="label">Remediation</label>
<textarea id="remediation" class="input"></textarea>
</div>

<div class="action-row">
  <button id="addQuestionBtn" class="primary-btn full-width">Add Question</button>
</div>

</section>


<!-- EXAM BANKS -->

<section class="panel">

<h3>Exam Banks</h3>

<div id="examBanksList" class="exam-banks-list">

<!-- Example layout (rendered by JS later)
<div class="exam-bank-row">
  <span class="bank-name">Sherlock Holmes Exam</span>
  <span class="bank-count">(40)</span>
  <button class="secondary-btn pull-bank-btn">Pull Exam Bank</button>
</div>
-->

</div>

</section>

<!-- QUESTION BANK -->

<section class="panel">

<h3>Question Bank</h3>

<div id="questionList" class="question-list"></div>

</section>


<!-- GENERATED EXAM BANK -->

<section class="panel">

<h3>Generated Exam Bank</h3>

<div id="generatedBankStatus" class="bank-status">
Status: Not Generated
</div>

<div id="generatedBankInfo" class="bank-info">
Questions: 0
</div>

</section>

<!-- EXPORT -->

<section class="panel">

<h3>Export</h3>

<button id="exportExamBtn" class="primary-btn full-width">
Export SOBT Exam Bank
</button>

</section>


<!-- STATUS + LOG -->

<section class="panel status-panel">

<h3>Tool Log</h3>

<div class="log-container">
<pre id="logOutput"></pre>
</div>

</section>


</div>

<script src="lib/xlsx.full.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
